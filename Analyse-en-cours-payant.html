<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Génération de votre dossier - Itinesio.ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: #1e293b;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .loader-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            text-align: center;
        }

        .progress-bar-bg {
            background: #f1f5f9;
            height: 8px;
            width: 100%;
            border-radius: 10px;
            margin: 2.5rem 0;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #2563eb, #10b981);
            height: 100%;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.2);
        }

        .status-text {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #64748b;
            min-height: 24px;
        }

        .ai-core {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 2.5rem;
        }

        .ai-ring {
            position: absolute;
            inset: 0;
            border: 3px solid #f1f5f9;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 2s linear infinite;
        }

        .ai-ring-inner {
            position: absolute;
            inset: 20px;
            border: 3px solid #f1f5f9;
            border-bottom: 3px solid #10b981;
            border-radius: 50%;
            animation: spin-reverse 1.5s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }

        .fade-in { 
            animation: fadeIn 0.8s ease-out forwards; 
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .brand-logo {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.4em;
            color: #0f172a;
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="ai-core">
            <div class="ai-ring"></div>
            <div class="ai-ring-inner"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <i class="fa-solid fa-wand-magic-sparkles text-blue-600 text-2xl animate-pulse"></i>
            </div>
        </div>

        <div class="fade-in">
            <div class="inline-flex items-center gap-2 text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest mb-6 border border-emerald-100">
                <i class="fa-solid fa-check-circle"></i> Paiement Confirmé
            </div>
            
            <h2 class="text-2xl font-black text-slate-900 mb-2 tracking-tight">
                Génération de votre dossier <br/>
                <span id="display-destination" class="text-blue-600 capitalize">Premium</span>
            </h2>
            
            <p id="context-text" class="text-slate-400 text-sm mb-2 px-6 leading-relaxed">
                Préparation de l'itinéraire sur-mesure pour <span id="display-name" class="font-bold text-slate-600">...</span>
            </p>
        </div>

        <div class="progress-bar-bg">
            <div id="progress-fill" class="progress-bar-fill"></div>
        </div>

        <div id="status-label" class="status-text italic">Initialisation de l'IA...</div>

        <div class="fixed bottom-12 left-0 right-0 text-center opacity-30">
            <span class="brand-logo uppercase">Itinesio<span class="text-emerald-500">.ai</span></span>
        </div>
    </div>

    <script>
        // 1. RÉCUPÉRATION DU CONTEXTE (URL Params)
        const urlParams = new URLSearchParams(window.location.search);
        const destination = urlParams.get('destination') || "votre voyage";
        const prenom = urlParams.get('nom') || "Voyageur";

        // Affichage dynamique du contexte
        document.getElementById('display-destination').innerText = destination;
        document.getElementById('display-name').innerText = prenom;

        // 2. ÉTAPES DE CHARGEMENT
        const steps = [
            { p: 12, t: "Authentification de la session..." },
            { p: 25, t: "Extraction des algorithmes logistiques..." },
            { p: 40, t: `Calcul des trajets optimaux à ${destination}...` },
            { p: 55, t: "Collecte des données météo en temps réel..." },
            { p: 70, t: "Sélection des perles rares (adresses secrètes)..." },
            { p: 85, t: "Assemblage du PDF haute définition..." },
            { p: 95, t: "Finalisation du dossier premium..." },
            { p: 100, t: "Prêt ! Affichage en cours..." }
        ];

        let currentStep = 0;
        const fill = document.getElementById('progress-fill');
        const label = document.getElementById('status-label');

        function updateProgress() {
            if (currentStep < steps.length) {
                const step = steps[currentStep];
                fill.style.width = step.p + "%";
                label.innerText = step.t;
                
                currentStep++;
                
                // Vitesse variable pour simuler un travail réel
                const nextDelay = Math.random() * (1600 - 900) + 900; 
                
                if (currentStep === steps.length) {
                    setTimeout(() => {
                        // Redirection vers la page finale avec les paramètres pour garder le contexte
                        const finalUrl = `thanks_page.html?destination=${encodeURIComponent(destination)}&nom=${encodeURIComponent(prenom)}`;
                        console.log("Redirection vers : " + finalUrl);
                        // window.location.href = finalUrl; 
                    }, 1500);
                } else {
                    setTimeout(updateProgress, nextDelay);
                }
            }
        }

        // Lancement
        window.onload = () => {
            setTimeout(updateProgress, 500);
        };
    </script>
</body>
</html>
