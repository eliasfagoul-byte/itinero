<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votre Voyage Personnalisé - Itinesio IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .timeline-line {
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #e2e8f0;
            z-index: 0;
        }

        .premium-card {
            background: #0f172a;
            color: white;
        }
    </style>
</head>
<body class="p-4 md:p-8 max-w-2xl mx-auto">

    <header class="mb-8">
        <div class="inline-block bg-indigo-50 text-indigo-600 text-[10px] font-bold tracking-widest uppercase px-3 py-1 rounded-full mb-4">
            Analyse Complétée pour <span id="client-name">Voyageur</span>
        </div>
        <h1 class="text-4xl font-extrabold text-slate-900 mb-2">
            Votre voyage à <span id="destination" class="text-indigo-600 capitalize">...</span>
        </h1>
        <p class="text-slate-500 italic text-lg leading-tight mb-8">
            "L'alliance parfaite entre <span id="trip-style-text" class="font-semibold text-slate-700">votre style</span> et les trésors cachés."
        </p>

        <div class="space-y-3">
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-500">
                    <i class="fa-solid fa-users"></i>
                </div>
                <div>
                    <p class="text-[10px] uppercase tracking-wider text-slate-400 font-bold">Votre Profil</p>
                    <p id="user-profile" class="text-slate-700 font-semibold">Chargement...</p>
                </div>
            </div>

            <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="w-12 h-12 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-400">
                    <i class="fa-solid fa-wallet text-xl"></i>
                </div>
                <div>
                    <p class="text-[10px] uppercase tracking-wider text-slate-400 font-bold">Budget & Infos</p>
                    <p id="user-budget" class="text-slate-700 font-semibold">Chargement...</p>
                </div>
            </div>
        </div>
    </header>

    <section class="mb-12">
        <div class="flex items-start gap-4 mb-10">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-indigo-200 z-10">
                <i class="fa-solid fa-map-location-dot"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 leading-tight">
                Vos recommandations générées<br>pour <span class="text-indigo-600 capitalize" id="dest-recap">...</span>
            </h2>
        </div>

        <div class="relative space-y-12 pl-4" id="dynamic-recommendations">
            <div class="timeline-line"></div>
            </div>
    </section>

    <section class="premium-card rounded-[40px] p-8 shadow-2xl mb-12 relative overflow-hidden">
        <div class="relative z-10">
            <div class="inline-block bg-slate-800 text-[10px] font-bold tracking-widest uppercase px-3 py-1 rounded-lg mb-6 border border-slate-700 text-slate-400">
                Pack Voyageur
            </div>
            <h2 class="text-4xl font-extrabold italic mb-6">Votre itinéraire complet à <span id="dest-price" class="capitalize">...</span></h2>
            <div class="flex items-baseline gap-3 mb-8">
                <span class="text-6xl font-black">5€</span>
                <span class="text-2xl text-slate-500 line-through">19€</span>
            </div>
            <button class="w-full bg-indigo-500 hover:bg-indigo-400 text-white font-black py-5 rounded-2xl flex items-center justify-center gap-3 transition-all uppercase tracking-wider">
                <i class="fa-solid fa-cart-shopping"></i>
                Débloquer mon pack
            </button>
        </div>
        <div class="absolute -bottom-20 -right-20 w-64 h-64 bg-indigo-500/10 rounded-full blur-3xl"></div>
    </section>

    <script>
        // --- 1. BASE DE DONNÉES FICTIVE ---
        const recommendationsDB = {
            "rome": [
                { theme: "blue", icon: "fa-bed", title: "Quartier Monti", note: "9.2/10", source: "Booking", desc: "Évitez les zones trop touristiques. Quartier d'artisans, parfait pour un boutique-hôtel." },
                { theme: "orange", icon: "fa-utensils", title: "Osteria du Testaccio", note: "4.8/5", source: "TripAdvisor", desc: "Testaccio est l'âme culinaire de la ville. On y trouve la meilleure Carbonara historique." },
                { theme: "emerald", icon: "fa-leaf", title: "Villa Doria Pamphili", note: "4.7/5", source: "Google", desc: "Un parc immense, bien plus calme que la Villa Borghese pour un pique-nique sans bruit." }
            ],
            "tokyo": [
                { theme: "blue", icon: "fa-bed", title: "Quartier Shimokitazawa", note: "9.5/10", source: "Locaux", desc: "Le quartier bohème et vintage de Tokyo, parfait pour s'imprégner de la culture loin des néons." },
                { theme: "orange", icon: "fa-utensils", title: "Ramen Street", note: "4.9/5", source: "Google", desc: "Située sous la gare de Tokyo, une sélection des meilleurs bouillons du pays." },
                { theme: "purple", icon: "fa-ticket", title: "TeamLab Planets", note: "Top 1%", source: "Guides", desc: "Une expérience sensorielle et visuelle hors du commun où l'on marche littéralement dans l'eau." }
            ],
            "islande": [
                { theme: "purple", icon: "fa-car", title: "Route Circulaire (Sud)", note: "Top 1%", source: "Guide", desc: "Idéal pour l'aventure. Cascades secrètes, glaciers et plages de sable noir au programme." },
                { theme: "blue", icon: "fa-house", title: "Guesthouse Vik", note: "9.0/10", source: "Booking", desc: "Un hébergement chaleureux en pleine nature pour vous reposer après vos journées de découverte." },
                { theme: "emerald", icon: "fa-water", title: "Source chaude secrète", note: "Secret", source: "Itinesio", desc: "Oubliez le Blue Lagoon trop touristique. L'IA a trouvé une source naturelle sans personne." }
            ]
        };

        function getTheme(themeName) {
            const themes = {
                blue: { dot: "bg-blue-500", icon: "text-blue-500", bgBadge: "bg-blue-50", borderBadge: "border-blue-100", textNote: "text-blue-600", textSource: "text-blue-400" },
                orange: { dot: "bg-orange-500", icon: "text-orange-500", bgBadge: "bg-orange-50", borderBadge: "border-orange-100", textNote: "text-orange-600", textSource: "text-orange-400" },
                emerald: { dot: "bg-emerald-500", icon: "text-emerald-500", bgBadge: "bg-emerald-50", borderBadge: "border-emerald-100", textNote: "text-emerald-600", textSource: "text-emerald-400" },
                purple: { dot: "bg-purple-500", icon: "text-purple-500", bgBadge: "bg-purple-50", borderBadge: "border-purple-100", textNote: "text-purple-600", textSource: "text-purple-400" }
            };
            return themes[themeName] || themes.blue;
        }

        function buildRecommendation(rec) {
            const t = getTheme(rec.theme);
            return `
            <div class="relative pl-10">
                <div class="absolute left-[2px] top-2 w-4 h-4 rounded-full ${t.dot} border-4 border-white shadow-sm z-10"></div>
                <div class="flex justify-between items-start mb-2">
                    <div class="flex items-center gap-3">
                        <span class="text-xl ${t.icon}"><i class="fa-solid ${rec.icon}"></i></span>
                        <h3 class="text-xl font-bold text-slate-800 leading-tight">${rec.title}</h3>
                    </div>
                    <div class="${t.bgBadge} px-3 py-1 rounded-xl text-right border ${t.borderBadge}">
                        <p class="text-[11px] font-bold ${t.textNote}">${rec.note}</p>
                        <p class="text-[9px] ${t.textSource} font-semibold uppercase italic">${rec.source}</p>
                    </div>
                </div>
                <p class="text-slate-600 leading-relaxed text-sm">${rec.desc}</p>
            </div>`;
        }

        // --- LOGIQUE DE RÉCUPÉRATION DES DONNÉES ---
        function updateUI() {
            // On récupère les paramètres directement depuis l'URL
            const urlParams = new URLSearchParams(window.location.search);
            
            const data = {
                destination: urlParams.get('destination') || "votre destination",
                prenom: urlParams.get('nom') || "Voyageur",
                duree: urlParams.get('duree') || "7 jours",
                // On pourrait ajouter d'autres params ici si tu modifies ton formulaire
                style: "Culture & Découverte" 
            };

            // Mise à jour de l'en-tête
            document.getElementById('destination').innerText = data.destination;
            document.getElementById('dest-recap').innerText = data.destination;
            document.getElementById('dest-price').innerText = data.destination;
            document.getElementById('client-name').innerText = data.prenom;
            document.getElementById('user-profile').innerText = `${data.duree} • 2 voyageurs • ${data.style}`;
            document.getElementById('user-budget').innerText = `1500€/pers • Recherche d'hôtel`;

            // Injection des recommandations
            const container = document.getElementById('dynamic-recommendations');
            const searchKey = data.destination.toLowerCase().trim();
            let userRecs = recommendationsDB[searchKey];

            if (!userRecs) {
                userRecs = [
                    { theme: "blue", icon: "fa-plane-arrival", title: `Arrivée à ${data.destination}`, note: "Top", source: "Itinesio", desc: `Commencez votre séjour par une immersion totale dans l'atmosphère locale de ${data.destination}.` },
                    { theme: "orange", icon: "fa-compass", title: "Exploration sur-mesure", note: "Secret", source: "Local", desc: `Nous avons déniché des pépites parfaites pour votre séjour de ${data.duree}.` },
                    { theme: "emerald", icon: "fa-star", title: "Activité Incontournable", note: "5/5", source: "Guide", desc: "Une expérience unique sélectionnée par notre IA selon vos préférences." }
                ];
            }

            let htmlContent = '<div class="timeline-line"></div>';
            userRecs.forEach(rec => {
                htmlContent += buildRecommendation(rec);
            });
            container.innerHTML = htmlContent;
        }

        window.onload = updateUI;
    </script>
</body>
</html>
