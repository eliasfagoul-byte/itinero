<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Génération de votre dossier - Itinesio.ai</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: #1e293b;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .loader-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            text-align: center;
        }

        .progress-bar-bg {
            background: #f1f5f9;
            height: 8px;
            width: 100%;
            border-radius: 10px;
            margin: 2.5rem 0;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #2563eb, #10b981);
            height: 100%;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.2);
        }

        .status-text {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #64748b;
            min-height: 24px;
        }

        .ai-core {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 2.5rem;
        }

        .ai-ring {
            position: absolute;
            inset: 0;
            border: 3px solid #f1f5f9;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            animation: spin 2s linear infinite;
        }

        .ai-ring-inner {
            position: absolute;
            inset: 20px;
            border: 3px solid #f1f5f9;
            border-bottom: 3px solid #10b981;
            border-radius: 50%;
            animation: spin-reverse 1.5s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }

        .fade-in { 
            animation: fadeIn 0.8s ease-out forwards; 
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .brand-logo {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.4em;
            color: #0f172a;
        }
    </style>
</head>
<body>
    <nav class="absolute top-0 left-0 p-6 z-50">
  <a href="index.html" class="inline-flex items-center gap-2 hover:opacity-80 transition">
      <img src="logo.png" alt="Logo Itinesio" class="w-10 h-10 object-contain">
      <div class="font-bold text-xl tracking-tight text-slate-950">Itinesio <span class="text-emerald-500">.ai</span></div>
  </a>
</nav>

    <div class="loader-container">
        <div class="ai-core">
            <div class="ai-ring"></div>
            <div class="ai-ring-inner"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <i class="fa-solid fa-wand-magic-sparkles text-blue-600 text-2xl animate-pulse"></i>
            </div>
        </div>

        <div class="fade-in">
            <div class="inline-flex items-center gap-2 text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest mb-6 border border-emerald-100">
                <i class="fa-solid fa-check-circle"></i> Paiement Confirmé
            </div>
            
            <h2 class="text-2xl font-black text-slate-900 mb-2 tracking-tight">
                Génération de votre dossier <br/>
                <span id="display-destination" class="text-blue-600 capitalize">Premium</span>
            </h2>
            
            <p id="context-text" class="text-slate-400 text-sm mb-2 px-6 leading-relaxed">
                Analyse IA en cours pour <span id="display-name" class="font-bold text-slate-600">...</span>
            </p>
        </div>

        <div class="progress-bar-bg">
            <div id="progress-fill" class="progress-bar-fill"></div>
        </div>

        <div id="status-label" class="status-text italic">Initialisation de l'IA...</div>

        <div class="fixed bottom-12 left-0 right-0 text-center opacity-30">
            <span class="brand-logo uppercase">Itinesio<span class="text-emerald-500">.ai</span></span>
        </div>
    </div>

    <script>
        const POLLING_URL = "https://fagoul.app.n8n.cloud/webhook/polling-payant";
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('jobId'); 
        const destination = urlParams.get('destination') || "votre voyage";
        const prenom = urlParams.get('nom') || "Voyageur";

        document.getElementById('display-destination').innerText = destination;
        document.getElementById('display-name').innerText = prenom;

        const fill = document.getElementById('progress-fill');
        const label = document.getElementById('status-label');

        const messages = [
            "Authentification de la session...",
            "Analyse de vos préférences...",
            "Calcul des trajets optimaux...",
            "Sélection des perles rares...",
            "Génération du dossier PDF HD...",
            "Finalisation des recommandations..."
        ];

        let progress = 0;
        let startTime = Date.now();
        const MAX_DURATION = 120000;

        async function checkStatus() {
            if (Date.now() - startTime > MAX_DURATION) {
                label.innerText = "Délai dépassé. Veuillez contacter le support.";
                label.style.color = "#ef4444";
                return;
            }

            try {
                const response = await fetch(`${POLLING_URL}?jobId=${jobId}`);
                let data = await response.json();
                
                if (Array.isArray(data)) data = data[0];

                if (data.downloadUrl || data.status === 'ready' || data.status === 'completed') {
                    progress = 100;
                    fill.style.width = "100%";
                    label.innerText = "Dossier prêt ! Redirection...";
                    
                    setTimeout(() => {
                        window.location.href = data.downloadUrl; 
                    }, 1500);
                } else {
                    if (progress < 90) {
                        progress += Math.random() * 5;
                        fill.style.width = progress + "%";
                        label.innerText = messages[Math.floor(Math.random() * messages.length)];
                    }
                    setTimeout(checkStatus, 5000);
                }
            } catch (error) {
                console.error("Erreur polling:", error);
                setTimeout(checkStatus, 5000);
            }
        }

        window.onload = () => {
            if (!jobId) {
                label.innerText = "Erreur : ID de session manquant";
                label.style.color = "red";
                return;
            }
            // Changé à 55 secondes (55000ms) pour le premier polling
            setTimeout(checkStatus, 55000);
            
            label.innerText = "Préparation de l'environnement...";
            progress = 10;
            fill.style.width = "10%";
        };
    </script>
</body>
</html>
