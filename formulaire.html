<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration | Itinesio.ai</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #FAFAFA;
            color: #1A1D24;
        }

        .gradient-text {
            background: linear-gradient(135deg, #3B82F6, #10B981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: white;
            border: 1px solid #F1F5F9;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.03);
        }

        .input-field {
            width: 100%;
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            background-color: #F8FAFC;
            border: 1px solid #E2E8F0;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-field:focus {
            background-color: white;
            border-color: #3B82F6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* Style des boutons Radio (Mood & Hébergement) */
        .mood-card {
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }

        .mood-radio:checked + .mood-card {
            border-color: #3B82F6;
            background-color: #EFF6FF;
            transform: translateY(-4px);
        }

        .progress-bar {
            height: 4px;
            background: linear-gradient(90deg, #3B82F6, #10B981);
            width: 0%;
            transition: width 0.4s ease;
        }

        .btn-submit {
            background: #1e293b;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            background: #0f172a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="antialiased bg-slate-50/50">

    <nav class="w-full bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
           <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition">
    <img src="logo.png" alt="Logo Itinesio" class="w-10 h-10 object-contain">
    <div class="font-bold text-xl tracking-tight text-slate-950">Itinesio <span class="text-emerald-500">.ai</span></div>
</a>
            <a href="index.html" class="text-sm font-bold text-slate-400 hover:text-blue-600 transition flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Retour
            </a>
        </div>
        <div class="progress-bar" id="progress"></div>
    </nav>

    <main class="max-w-4xl mx-auto pt-12 pb-24 px-6">
        
        <div class="text-center mb-12">
            <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight text-slate-900 mb-4">
                Configurez votre <span class="gradient-text">évasion.</span>
            </h1>
            <p class="text-slate-500 font-medium">L'IA Itinesio a besoin de quelques détails pour sourcer le meilleur.</p>
        </div>

        <form id="itinesio-form" class="space-y-8">
            
            <div class="glass-card p-8">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center"><i class="fa-solid fa-map-location-dot"></i></div>
                    <h2 class="text-xl font-bold text-slate-800">L'essentiel</h2>
                </div>
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase text-slate-400 tracking-wider ml-1">Prénom</label>
                        <input type="text" name="prenom" required placeholder="Ex: Thomas" class="input-field">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase text-slate-400 tracking-wider ml-1">Destination de rêve</label>
                        <input type="text" name="destination" required placeholder="Ex: Bali, New York, Islande..." class="input-field">
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <label class="text-xs font-bold uppercase text-slate-400 tracking-wider ml-2">Quel est le "Mood" de ce voyage ?</label>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <label class="relative">
                        <input type="radio" name="type_sejour" value="romantique" class="mood-radio hidden" checked>
                        <div class="mood-card glass-card p-6 flex flex-col items-center text-center gap-3">
                            <i class="fas fa-heart text-2xl text-rose-500"></i>
                            <span class="text-sm font-bold text-slate-700">Romantique</span>
                        </div>
                    </label>
                    <label class="relative">
                        <input type="radio" name="type_sejour" value="aventure" class="mood-radio hidden">
                        <div class="mood-card glass-card p-6 flex flex-col items-center text-center gap-3">
                            <i class="fas fa-mountain text-2xl text-emerald-500"></i>
                            <span class="text-sm font-bold text-slate-700">Aventure</span>
                        </div>
                    </label>
                    <label class="relative">
                        <input type="radio" name="type_sejour" value="chill" class="mood-radio hidden">
                        <div class="mood-card glass-card p-6 flex flex-col items-center text-center gap-3">
                            <i class="fas fa-umbrella-beach text-2xl text-sky-500"></i>
                            <span class="text-sm font-bold text-slate-700">Détente</span>
                        </div>
                    </label>
                    <label class="relative">
                        <input type="radio" name="type_sejour" value="culture" class="mood-radio hidden">
                        <div class="mood-card glass-card p-6 flex flex-col items-center text-center gap-3">
                            <i class="fas fa-landmark text-2xl text-amber-500"></i>
                            <span class="text-sm font-bold text-slate-700">Culture</span>
                        </div>
                    </label>
                    <label class="relative">
                        <input type="radio" name="type_sejour" value="gastronomique" class="mood-radio hidden">
                        <div class="mood-card glass-card p-6 flex flex-col items-center text-center gap-3">
                            <i class="fas fa-utensils text-2xl text-orange-500"></i>
                            <span class="text-sm font-bold text-slate-700">Gastro</span>
                        </div>
                    </label>
                    <label class="relative">
                        <input type="radio" name="type_sejour" value="insolite" class="mood-radio hidden">
                        <div class="mood-card glass-card p-6 flex flex-col items-center text-center gap-3">
                            <i class="fas fa-rocket text-2xl text-indigo-500"></i>
                            <span class="text-sm font-bold text-slate-700">Insolite</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="space-y-4">
                <label class="text-xs font-bold uppercase text-slate-400 tracking-wider ml-2">Quel type d'hébergement préférez-vous ?</label>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <label class="relative">
                        <input type="radio" name="type_hebergement" value="hotel" class="mood-radio hidden" checked>
                        <div class="mood-card glass-card p-6 flex flex-col items-center text-center gap-3">
                            <i class="fas fa-hotel text-2xl text-blue-500"></i>
                            <span class="text-sm font-bold text-slate-700">Hôtel</span>
                        </div>
                    </label>
                    <label class="relative">
                        <input type="radio" name="type_hebergement" value="airbnb" class="mood-radio hidden">
                        <div class="mood-card glass-card p-6 flex flex-col items-center text-center gap-3">
                            <i class="fab fa-airbnb text-2xl text-rose-500"></i>
                            <span class="text-sm font-bold text-slate-700">Airbnb</span>
                        </div>
                    </label>
                    <label class="relative">
                        <input type="radio" name="type_hebergement" value="chez_habitant" class="mood-radio hidden">
                        <div class="mood-card glass-card p-6 flex flex-col items-center text-center gap-3">
                            <i class="fas fa-house-user text-2xl text-emerald-500"></i>
                            <span class="text-sm font-bold text-slate-700">Chez l'habitant</span>
                        </div>
                    </label>
                    <label class="relative">
                        <input type="radio" name="type_hebergement" value="van" class="mood-radio hidden">
                        <div class="mood-card glass-card p-6 flex flex-col items-center text-center gap-3">
                            <i class="fas fa-caravan text-2xl text-amber-600"></i>
                            <span class="text-sm font-bold text-slate-700">Van</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="glass-card p-8">
                <div class="grid md:grid-cols-3 gap-8">
                    <div class="space-y-4">
                        <div class="flex items-center gap-2 font-bold text-sm text-slate-700">
                            <i class="fas fa-calendar-alt text-blue-600"></i> Dates
                        </div>
                        <div class="space-y-2">
                            <input type="date" name="date_depart" required class="input-field text-sm">
                            <input type="date" name="date_retour" required class="input-field text-sm">
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div class="flex items-center gap-2 font-bold text-sm text-slate-700">
                            <i class="fas fa-users text-blue-600"></i> Voyageurs
                        </div>
                        <input type="number" name="nb_voyageurs" min="1" value="2" class="input-field font-bold">
                    </div>
                    <div class="space-y-4">
                        <div class="flex items-center gap-2 font-bold text-sm text-slate-700">
                            <i class="fas fa-wallet text-blue-600"></i> Budget estimé
                        </div>
                        <div class="relative">
                            <input type="number" name="budget_total" placeholder="Ex: 2500" class="input-field font-bold pr-10">
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 font-bold text-slate-400">€</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card p-8 space-y-4">
                <div class="flex items-center justify-between">
                    <label class="text-xs font-bold uppercase text-slate-400 tracking-wider">Préférences Alimentaires</label>
                    <span class="text-[10px] bg-emerald-50 text-emerald-600 font-bold px-2 py-1 rounded">Optionnel</span>
                </div>
                <textarea name="preferences_food" placeholder="Allergies, régimes spécifiques ou envies particulières..." class="input-field min-h-[100px] text-sm"></textarea>
            </div>

            <div class="glass-card p-8 border-2 border-blue-50 bg-blue-50/20">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 rounded-xl bg-white text-blue-600 flex items-center justify-center shadow-sm"><i class="fa-solid fa-envelope"></i></div>
                    <h2 class="text-xl font-bold text-slate-800">Où envoyer votre pack ?</h2>
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold uppercase text-slate-400 tracking-wider ml-1">Email de réception</label>
                    <input type="email" name="email" required placeholder="votre@email.com" class="input-field bg-white">
                    <p class="text-[11px] text-slate-400 ml-1">Votre itinéraire sera envoyé à cette adresse sous 60 secondes.</p>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="btn-submit w-full py-5 rounded-2xl text-white font-bold text-lg flex items-center justify-center gap-3">
                <span>Générer mon itinéraire sur mesure</span>
                <i class="fa-solid fa-sparkles"></i>
            </button>
        </form>
    </main>

    <script>
        function generateJobId() {
            return "job_" + Date.now().toString(36) + "_" + Math.random().toString(36).substring(2, 7);
        }
        const currentJobId = generateJobId();

        const form = document.getElementById('itinesio-form');
        const btn = document.getElementById('submit-btn');
        const progressBar = document.getElementById('progress');

        form.addEventListener('input', () => {
            const required = form.querySelectorAll('[required]');
            let valid = 0;
            required.forEach(input => { if(input.value) valid++; });
            progressBar.style.width = (valid / required.length * 100) + "%";
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            // Étape 1 : Changement visuel au clic (Chargement)
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Analyse IA en cours...';
            btn.disabled = true;

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            data.jobId = currentJobId;

            try {
                // Envoi des données
                await fetch("https://fagoul.app.n8n.cloud/webhook/test", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                // Étape 2 : Succès de l'envoi -> Message de remerciement et redirection imminente
                btn.innerHTML = '<i class="fa-solid fa-check text-emerald-400"></i> Merci ! Redirection en cours...';
                
                // On passe à 2000ms (2 secondes) pour laisser au client le temps de lire le message
                setTimeout(() => {
                    window.location.href = `/analyse-en-cours?jobId=${encodeURIComponent(currentJobId)}`;
                }, 2000); 

            } catch (error) {
                // Gestion d'erreur en cas de problème de réseau
                btn.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Erreur de connexion, veuillez réessayer';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
