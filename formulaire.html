<!DOCTYPE html> 
<html lang="fr"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <script src="https://cdn.tailwindcss.com"></script> 
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"> 
    <title>Itinesio | Configuration Voyage</title> 
    <style> 
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;800;900&family=Playfair+Display:ital,wght@1,600&family=Inter:wght@400;500;600&display=swap'); 
         
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F8FAFC; 
            color: #1E293B; 
        } 

        h1, h2, h3 { font-family: 'Outfit', sans-serif; } 
        .font-tagline { font-family: 'Playfair Display', serif; font-style: italic; } 

        .glass-card { 
            background: white; 
            border: 1px solid #E2E8F0; 
            border-radius: 2rem; 
            transition: all 0.3s ease; 
        } 

        .style-card { 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 2px solid transparent; 
        } 

        .style-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); 
        }

        /* Barre de progression */
        .progress-container {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            height: 4px;
            background: #F1F5F9;
            z-index: 40;
        }
        .progress-bar {
            height: 100%;
            background: #4F46E5;
            width: 0%;
            transition: width 0.5s ease;
        }

        /* --- ÉTATS SÉLECTIONNÉS --- */ 
        input:checked + .style-card {
            border-color: #4F46E5;
            background-color: #EEF2FF;
        }

        /* Couleurs spécifiques par Mood */
        input[value="romantique"]:checked + .style-card { border-color: #EC4899; background-color: #FDF2F8; }
        input[value="aventure"]:checked + .style-card { border-color: #10B981; background-color: #ECFDF5; }
        input[value="chill"]:checked + .style-card { border-color: #0EA5E9; background-color: #F0F9FF; }
        input[value="gastronomique"]:checked + .style-card { border-color: #F97316; background-color: #FFF7ED; }
        input[value="culture"]:checked + .style-card { border-color: #D97706; background-color: #FFFBEB; }
        input[value="insolite"]:checked + .style-card { border-color: #6366F1; background-color: #EEF2FF; }

        .btn-primary { 
            background: #4F46E5; 
            transition: all 0.3s ease; 
        } 

        .btn-primary:hover { 
            transform: scale(1.02); 
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.3); 
        } 
    </style> 
</head> 
<body class="antialiased"> 

    <nav class="fixed w-full z-50 px-6 py-4 bg-white/80 backdrop-blur-md border-b border-slate-100"> 
        <div class="max-w-5xl mx-auto flex items-center justify-between"> 
            <div class="flex items-baseline gap-1"> 
                <span class="text-2xl font-[900] tracking-tighter text-slate-900">Itinesio</span> 
                <span class="w-1.5 h-1.5 bg-indigo-600 rounded-full"></span> 
            </div> 
            <a href="#" class="text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-indigo-600 transition"> 
                <i class="fas fa-arrow-left mr-2"></i>Retour 
            </a> 
        </div> 
    </nav>

    <div class="progress-container">
        <div id="progress" class="progress-bar"></div>
    </div> 

    <main class="max-w-3xl mx-auto pt-32 pb-20 px-6"> 
        <header class="mb-12 text-center"> 
            <h1 class="text-4xl md:text-5xl font-[900] text-slate-900 tracking-tight mb-4"> 
                Prêt pour l' <span class="text-indigo-600 italic">aventure ?</span> 
            </h1> 
            <p class="font-tagline text-lg text-slate-500">Personnalisez chaque détail de votre futur souvenir.</p> 
        </header> 

        <form id="itinesio-form" class="space-y-10"> 
             
            <!-- SECTION 1: IDENTITÉ --> 
            <div class="glass-card p-8 shadow-sm step-section" data-step="1"> 
                <div class="grid md:grid-cols-2 gap-6"> 
                    <div class="space-y-2"> 
                        <label class="text-[11px] font-bold uppercase text-slate-400 tracking-wider ml-1">Prénom</label> 
                        <input type="text" name="prenom" required placeholder="Votre prénom" class="step-input w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:bg-white focus:ring-2 focus:ring-indigo-100 transition outline-none font-medium"> 
                    </div> 
                    <div class="space-y-2"> 
                        <label class="text-[11px] font-bold uppercase text-slate-400 tracking-wider ml-1">Destination</label> 
                        <input type="text" name="destination" required placeholder="Ex: Tokyo, Islande..." class="step-input w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:bg-white focus:ring-2 focus:ring-indigo-100 transition outline-none font-medium"> 
                    </div> 
                </div> 
            </div> 

            <!-- SECTION 2: MOOD --> 
            <div class="space-y-4 step-section" data-step="2"> 
                <label class="text-[11px] font-bold uppercase text-slate-400 tracking-wider ml-5">Quel est votre "Mood" ?</label> 
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4"> 
                    <label class="relative cursor-pointer"> 
                        <input type="radio" name="type_sejour" value="romantique" class="peer hidden" checked> 
                        <div class="style-card p-6 glass-card flex flex-col items-center text-center gap-3"> 
                            <i class="fas fa-heart text-3xl text-pink-400"></i> 
                            <span class="text-sm font-bold text-slate-700">Romantique</span> 
                        </div> 
                    </label> 
                    <label class="relative cursor-pointer"> 
                        <input type="radio" name="type_sejour" value="aventure" class="peer hidden"> 
                        <div class="style-card p-6 glass-card flex flex-col items-center text-center gap-3"> 
                            <i class="fas fa-mountain text-3xl text-emerald-400"></i> 
                            <span class="text-sm font-bold text-slate-700">Aventure</span> 
                        </div> 
                    </label> 
                    <label class="relative cursor-pointer"> 
                        <input type="radio" name="type_sejour" value="chill" class="peer hidden"> 
                        <div class="style-card p-6 glass-card flex flex-col items-center text-center gap-3"> 
                            <i class="fas fa-umbrella-beach text-3xl text-sky-400"></i> 
                            <span class="text-sm font-bold text-slate-700">Détente</span> 
                        </div> 
                    </label> 
                    <label class="relative cursor-pointer"> 
                        <input type="radio" name="type_sejour" value="gastronomique" class="peer hidden"> 
                        <div class="style-card p-6 glass-card flex flex-col items-center text-center gap-3"> 
                            <i class="fas fa-utensils text-3xl text-orange-400"></i> 
                            <span class="text-sm font-bold text-slate-700">Gastro</span> 
                        </div> 
                    </label> 
                    <label class="relative cursor-pointer"> 
                        <input type="radio" name="type_sejour" value="culture" class="peer hidden"> 
                        <div class="style-card p-6 glass-card flex flex-col items-center text-center gap-3"> 
                            <i class="fas fa-landmark text-3xl text-amber-500"></i> 
                            <span class="text-sm font-bold text-slate-700">Culture</span> 
                        </div> 
                    </label> 
                    <label class="relative cursor-pointer"> 
                        <input type="radio" name="type_sejour" value="insolite" class="peer hidden"> 
                        <div class="style-card p-6 glass-card flex flex-col items-center text-center gap-3"> 
                            <i class="fas fa-rocket text-3xl text-indigo-400"></i> 
                            <span class="text-sm font-bold text-slate-700">Insolite</span> 
                        </div> 
                    </label> 
                </div> 
            </div> 

            <!-- SECTION 3: HÉBERGEMENT (NOUVEAU) -->
            <div class="space-y-4 step-section" data-step="3"> 
                <label class="text-[11px] font-bold uppercase text-slate-400 tracking-wider ml-5">Type d'hébergement</label> 
                <div class="grid grid-cols-2 gap-4"> 
                    <label class="relative cursor-pointer"> 
                        <input type="radio" name="hebergement" value="luxe" class="peer hidden" checked> 
                        <div class="style-card p-6 glass-card flex items-center gap-4"> 
                            <div class="w-12 h-12 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600">
                                <i class="fas fa-hotel text-xl"></i>
                            </div>
                            <div class="text-left">
                                <p class="text-sm font-bold">Hôtel de Luxe</p>
                                <p class="text-[10px] text-slate-400 uppercase">Confort & Spa</p>
                            </div>
                        </div> 
                    </label> 
                    <label class="relative cursor-pointer"> 
                        <input type="radio" name="hebergement" value="airbnb" class="peer hidden"> 
                        <div class="style-card p-6 glass-card flex items-center gap-4"> 
                            <div class="w-12 h-12 rounded-full bg-rose-50 flex items-center justify-center text-rose-500">
                                <i class="fas fa-house-chimney text-xl"></i>
                            </div>
                            <div class="text-left">
                                <p class="text-sm font-bold">Airbnb Cosy</p>
                                <p class="text-[10px] text-slate-400 uppercase">Comme à la maison</p>
                            </div>
                        </div> 
                    </label> 
                    <label class="relative cursor-pointer"> 
                        <input type="radio" name="hebergement" value="van" class="peer hidden"> 
                        <div class="style-card p-6 glass-card flex items-center gap-4"> 
                            <div class="w-12 h-12 rounded-full bg-emerald-50 flex items-center justify-center text-emerald-600">
                                <i class="fas fa-caravan text-xl"></i>
                            </div>
                            <div class="text-left">
                                <p class="text-sm font-bold">Van aménagé</p>
                                <p class="text-[10px] text-slate-400 uppercase">Liberté totale</p>
                            </div>
                        </div> 
                    </label> 
                    <label class="relative cursor-pointer"> 
                        <input type="radio" name="hebergement" value="habitant" class="peer hidden"> 
                        <div class="style-card p-6 glass-card flex items-center gap-4"> 
                            <div class="w-12 h-12 rounded-full bg-amber-50 flex items-center justify-center text-amber-600">
                                <i class="fas fa-people-roof text-xl"></i>
                            </div>
                            <div class="text-left">
                                <p class="text-sm font-bold">Chez l'habitant</p>
                                <p class="text-[10px] text-slate-400 uppercase">Immersion locale</p>
                            </div>
                        </div> 
                    </label> 
                </div> 
            </div> 

            <!-- SECTION 4: ALIMENTATION (NOUVEAU) -->
            <div class="glass-card p-8 shadow-sm space-y-4 step-section" data-step="4">
                <div class="flex items-center justify-between">
                    <label class="text-[11px] font-bold uppercase text-slate-400 tracking-wider">Préférences Alimentaires</label>
                    <span class="px-3 py-1 bg-indigo-50 text-indigo-600 text-[10px] font-bold rounded-full">Sourcing Expert</span>
                </div>
                <textarea name="preferences_food" placeholder="Végétarien, allergies, fan de street-food ou restaurants étoilés ? Dites-nous tout..." class="w-full p-5 rounded-2xl bg-slate-50 border border-slate-100 focus:bg-white focus:ring-2 focus:ring-indigo-100 transition outline-none text-sm min-h-[100px]"></textarea>
                <div class="flex items-center gap-4 text-[10px] text-slate-400 italic">
                    <p><i class="fas fa-check-circle text-indigo-400 mr-1"></i> Guide du Routard</p>
                    <p><i class="fas fa-check-circle text-indigo-400 mr-1"></i> Michelin</p>
                    <p><i class="fas fa-check-circle text-indigo-400 mr-1"></i> Blogs Locaux</p>
                </div>
            </div>

            <!-- SECTION 5: LOGISTIQUE --> 
            <div class="glass-card p-8 shadow-sm space-y-6 step-section" data-step="5"> 
                <div class="grid md:grid-cols-2 gap-8"> 
                    <div class="space-y-4"> 
                        <div class="flex items-center gap-3"> 
                            <i class="fas fa-calendar-day text-indigo-600"></i> 
                            <h4 class="font-bold">Dates de séjour</h4> 
                        </div> 
                        <div class="flex gap-2"> 
                            <input type="date" name="date_depart" required class="step-input w-1/2 p-3 rounded-xl bg-slate-50 border border-slate-100 text-xs outline-none"> 
                            <input type="date" name="date_retour" required class="step-input w-1/2 p-3 rounded-xl bg-slate-50 border border-slate-100 text-xs outline-none"> 
                        </div> 
                    </div> 
                    <div class="space-y-4"> 
                        <div class="flex items-center gap-3"> 
                            <i class="fas fa-euro-sign text-indigo-600"></i> 
                            <h4 class="font-bold">Budget total</h4> 
                        </div> 
                        <input type="number" name="budget_total" placeholder="Ex: 2000" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-100 outline-none font-bold text-indigo-600"> 
                    </div> 
                </div> 
            </div> 

            <button type="submit" id="submit-btn" class="btn-primary w-full py-6 rounded-3xl text-white font-black text-xl flex items-center justify-center gap-4 group"> 
                <span>Générer l'itinéraire</span> 
                <i class="fas fa-wand-magic-sparkles transition group-hover:rotate-12"></i> 
            </button> 
        </form> 
    </main> 

    <script> 
        const form = document.getElementById('itinesio-form'); 
        const btn = document.getElementById('submit-btn'); 
        const progressBar = document.getElementById('progress');
        const inputs = document.querySelectorAll('.step-input, input[type="radio"], textarea, input[type="number"]');

        // Gestion de la barre de progression
        function updateProgress() {
            const sections = document.querySelectorAll('.step-section');
            let filledCount = 0;
            
            // On calcule le progrès en fonction du nombre de champs remplis
            const requiredFields = form.querySelectorAll('[required]');
            let validRequired = 0;
            requiredFields.forEach(f => { if(f.value) validRequired++; });
            
            // Formule simple pour la barre
            const progress = (validRequired / requiredFields.length) * 100;
            progressBar.style.width = `${progress}%`;
        }

        form.addEventListener('input', updateProgress);

        form.addEventListener('submit', async (e) => { 
            e.preventDefault(); 
            btn.innerHTML = '<span>IA en action...</span><i class="fas fa-spinner fa-spin"></i>'; 
            btn.disabled = true; 

            const formData = new FormData(form); 
            const data = Object.fromEntries(formData.entries()); 

            try { 
                // Envoi vers le Webhook n8n
                fetch("https://fagoul.app.n8n.cloud/webhook/test", { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(data) 
                }).catch(err => console.error("Webhook Error:", err)); 

                // Préparation des paramètres de redirection
                const params = new URLSearchParams({ 
                    destination: data.destination, 
                    nom: data.prenom,
                    mood: data.type_sejour,
                    hebergement: data.hebergement
                }); 
                 
                setTimeout(() => { 
                    window.location.href = `itineraire.html?${params.toString()}`; 
                }, 1500); 

            } catch (error) { 
                btn.innerHTML = '<span>Erreur</span>'; 
                btn.disabled = false; 
            } 
        }); 
        
        // Initialisation
        updateProgress();
    </script> 
</body> 
</html>
