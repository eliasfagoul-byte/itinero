<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <title>Itinesio | Configuration Voyage</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;800;900&family=Playfair+Display:ital,wght@1,600&family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
            color: #1E293B;
        }

        h1, h2, h3 { font-family: 'Outfit', sans-serif; }
        .font-tagline { font-family: 'Playfair Display', serif; font-style: italic; }

        .glass-card {
            background: white;
            border: 1px solid #E2E8F0;
            border-radius: 2rem;
            transition: all 0.3s ease;
        }

        /* Style de base pour les cartes de style */
        .style-card {
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
        }

        .style-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        /* --- IDENTITÉS COLORÉES PAR MOOD --- */
        
        /* 1. Romantique - Rose */
        .mood-romantique i { color: #F472B6; } /* Rose clair par défaut */
        input[value="romantique"]:checked + .style-card {
            border-color: #EC4899;
            background-color: #FDF2F8;
        }
        input[value="romantique"]:checked + .style-card i { color: #DB2777; }

        /* 2. Aventure - Vert */
        .mood-aventure i { color: #34D399; } /* Vert clair par défaut */
        input[value="aventure"]:checked + .style-card {
            border-color: #10B981;
            background-color: #ECFDF5;
        }
        input[value="aventure"]:checked + .style-card i { color: #059669; }

        /* 3. Détente - Bleu */
        .mood-chill i { color: #38BDF8; } /* Bleu clair par défaut */
        input[value="chill"]:checked + .style-card {
            border-color: #0EA5E9;
            background-color: #F0F9FF;
        }
        input[value="chill"]:checked + .style-card i { color: #0284C7; }

        /* 4. Gastronomie - Orange */
        .mood-gastronomie i { color: #FB923C; } /* Orange par défaut */
        input[value="gastronomique"]:checked + .style-card {
            border-color: #F97316;
            background-color: #FFF7ED;
        }
        input[value="gastronomique"]:checked + .style-card i { color: #EA580C; }

        /* 5. Culture - Ocre/Ambre */
        .mood-culture i { color: #FBBF24; } /* Ambre par défaut */
        input[value="culture"]:checked + .style-card {
            border-color: #D97706;
            background-color: #FFFBEB;
        }
        input[value="culture"]:checked + .style-card i { color: #B45309; }

        /* 6. Insolite - Indigo */
        .mood-insolite i { color: #818CF8; } /* Indigo clair par défaut */
        input[value="insolite"]:checked + .style-card {
            border-color: #6366F1;
            background-color: #EEF2FF;
        }
        input[value="insolite"]:checked + .style-card i { color: #4F46E5; }

        .btn-primary {
            background: #4F46E5;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.3);
        }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed w-full z-50 px-6 py-4 bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div class="flex items-baseline gap-1">
                <span class="text-2xl font-[900] tracking-tighter text-slate-900">Itinesio</span>
                <span class="w-1.5 h-1.5 bg-indigo-600 rounded-full"></span>
            </div>
            <a href="index.html" class="text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-indigo-600 transition">
                <i class="fas fa-arrow-left mr-2"></i>Retour
            </a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto pt-32 pb-20 px-6">
        <header class="mb-12 text-center">
            <h1 class="text-4xl md:text-5xl font-[900] text-slate-900 tracking-tight mb-4">
                Prêt pour l' <span class="text-indigo-600 italic">aventure ?</span>
            </h1>
            <p class="font-tagline text-lg text-slate-500">Choisissez votre ambiance, on crée la magie.</p>
        </header>

        <form id="itinesio-form" class="space-y-10">
            
            <!-- SECTION IDENTITÉ -->
            <div class="glass-card p-8 shadow-sm">
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold uppercase text-slate-400 tracking-wider ml-1">Prénom</label>
                        <input type="text" name="prenom" required placeholder="Votre prénom" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:bg-white focus:ring-2 focus:ring-indigo-100 transition outline-none font-medium">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold uppercase text-slate-400 tracking-wider ml-1">Destination</label>
                        <input type="text" name="destination" required placeholder="Ex: Tokyo, Islande..." class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-100 focus:bg-white focus:ring-2 focus:ring-indigo-100 transition outline-none font-medium">
                    </div>
                </div>
            </div>

            <!-- SECTION MOOD (COLORÉE) -->
            <div class="space-y-4">
                <label class="text-[11px] font-bold uppercase text-slate-400 tracking-wider ml-5">Quel est votre "Mood" ?</label>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <!-- Romantique -->
                    <label class="relative cursor-pointer">
                        <input type="radio" name="type_sejour" value="romantique" class="peer hidden" checked>
                        <div class="style-card mood-romantique p-6 glass-card flex flex-col items-center text-center gap-3">
                            <i class="fas fa-heart text-3xl transition-colors"></i>
                            <span class="text-sm font-bold text-slate-700">Romantique</span>
                        </div>
                    </label>

                    <!-- Aventure -->
                    <label class="relative cursor-pointer">
                        <input type="radio" name="type_sejour" value="aventure" class="peer hidden">
                        <div class="style-card mood-aventure p-6 glass-card flex flex-col items-center text-center gap-3">
                            <i class="fas fa-mountain text-3xl transition-colors"></i>
                            <span class="text-sm font-bold text-slate-700">Aventure</span>
                        </div>
                    </label>

                    <!-- Détente -->
                    <label class="relative cursor-pointer">
                        <input type="radio" name="type_sejour" value="chill" class="peer hidden">
                        <div class="style-card mood-chill p-6 glass-card flex flex-col items-center text-center gap-3">
                            <i class="fas fa-umbrella-beach text-3xl transition-colors"></i>
                            <span class="text-sm font-bold text-slate-700">Détente</span>
                        </div>
                    </label>

                    <!-- Gastronomie -->
                    <label class="relative cursor-pointer">
                        <input type="radio" name="type_sejour" value="gastronomique" class="peer hidden">
                        <div class="style-card mood-gastronomie p-6 glass-card flex flex-col items-center text-center gap-3">
                            <i class="fas fa-utensils text-3xl transition-colors"></i>
                            <span class="text-sm font-bold text-slate-700">Gastro</span>
                        </div>
                    </label>

                    <!-- Culture -->
                    <label class="relative cursor-pointer">
                        <input type="radio" name="type_sejour" value="culture" class="peer hidden">
                        <div class="style-card mood-culture p-6 glass-card flex flex-col items-center text-center gap-3">
                            <i class="fas fa-landmark text-3xl transition-colors"></i>
                            <span class="text-sm font-bold text-slate-700">Culture</span>
                        </div>
                    </label>

                    <!-- Insolite -->
                    <label class="relative cursor-pointer">
                        <input type="radio" name="type_sejour" value="insolite" class="peer hidden">
                        <div class="style-card mood-insolite p-6 glass-card flex flex-col items-center text-center gap-3">
                            <i class="fas fa-rocket text-3xl transition-colors"></i>
                            <span class="text-sm font-bold text-slate-700">Insolite</span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- SECTION LOGISTIQUE -->
            <div class="glass-card p-8 shadow-sm space-y-6">
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-calendar-day text-indigo-600"></i>
                            <h4 class="font-bold">Quand ?</h4>
                        </div>
                        <div class="flex gap-2">
                            <input type="date" name="date_depart" required class="w-1/2 p-3 rounded-xl bg-slate-50 border border-slate-100 text-xs outline-none">
                            <input type="date" name="date_retour" required class="w-1/2 p-3 rounded-xl bg-slate-50 border border-slate-100 text-xs outline-none">
                        </div>
                    </div>
                    <div class="space-y-4">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-euro-sign text-indigo-600"></i>
                            <h4 class="font-bold">Budget</h4>
                        </div>
                        <input type="number" name="budget_total" placeholder="Ex: 2000" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-100 outline-none font-bold text-indigo-600">
                    </div>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="btn-primary w-full py-6 rounded-3xl text-white font-black text-xl flex items-center justify-center gap-4 group">
                <span>Générer l'itinéraire</span>
                <i class="fas fa-wand-magic-sparkles transition group-hover:rotate-12"></i>
            </button>
        </form>
    </main>

    <script>
        const form = document.getElementById('itinesio-form');
        const btn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.innerHTML = '<span>IA en action...</span><i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                // Envoi vers le Webhook
                fetch("https://fagoul.app.n8n.cloud/webhook/test", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                }).catch(err => console.error(err));

                // Redirection
                const params = new URLSearchParams({
                    destination: data.destination,
                    nom: data.prenom,
                    duree: "7 jours"
                });
                
                setTimeout(() => {
                    window.location.href = `itineraire.html?${params.toString()}`;
                }, 1000);

            } catch (error) {
                btn.innerHTML = '<span>Erreur</span>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
